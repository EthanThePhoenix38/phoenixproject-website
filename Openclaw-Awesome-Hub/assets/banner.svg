<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1a0a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clawGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7931e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff4757;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7931e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff08" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="280" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="140" r="120" fill="#ff6b3508" />
  <circle cx="1100" cy="140" r="100" fill="#7c3aed08" />
  <circle cx="600" cy="280" r="200" fill="#2563eb05" />

  <!-- Claw Icon (left) -->
  <g transform="translate(80, 50)" filter="url(#glow)">
    <!-- Main claw shape -->
    <path d="M 60 160 C 40 120 20 80 30 40 C 35 20 55 10 70 25 C 80 35 75 60 65 80 C 80 55 95 30 115 15 C 130 3 148 8 150 28 C 152 45 135 70 120 90 C 140 65 160 45 178 35 C 195 25 210 32 208 52 C 206 70 185 90 165 105" fill="url(#clawGrad)" stroke="none" opacity="0.9"/>
    <!-- Claw tips -->
    <path d="M 30 40 C 25 25 20 10 28 5 C 36 0 45 12 42 28" fill="url(#clawGrad)" opacity="0.7"/>
    <path d="M 115 15 C 118 5 128 -2 135 5 C 142 12 138 26 130 35" fill="url(#clawGrad)" opacity="0.7"/>
    <path d="M 178 35 C 185 25 198 20 202 28 C 206 36 198 48 188 52" fill="url(#clawGrad)" opacity="0.7"/>
    <!-- Bot body -->
    <ellipse cx="90" cy="155" rx="45" ry="30" fill="#1e293b" stroke="url(#clawGrad)" stroke-width="2"/>
    <circle cx="78" cy="150" r="6" fill="url(#clawGrad)" opacity="0.8"/>
    <circle cx="102" cy="150" r="6" fill="url(#clawGrad)" opacity="0.8"/>
    <!-- Gear accent -->
    <circle cx="90" cy="165" r="8" fill="none" stroke="#f7931e" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Main Title -->
  <text x="280" y="110" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900" fill="url(#textGrad)" filter="url(#softGlow)" letter-spacing="-1">Awesome</text>
  <text x="280" y="165" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff" letter-spacing="-1">OpenClaw</text>
  <text x="280" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="url(#textGrad)" letter-spacing="2">Projects</text>

  <!-- Subtitle -->
  <text x="280" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#94a3b8" letter-spacing="0.5">Curated list of the best robotics &amp; OpenClaw ecosystem projects</text>

  <!-- Stats badges (right side) -->
  <g transform="translate(780, 55)">
    <!-- Auto-updated badge -->
    <rect x="0" y="0" width="160" height="32" rx="16" fill="#ff6b3520" stroke="#ff6b35" stroke-width="1"/>
    <text x="80" y="21" font-family="Arial" font-size="13" fill="#ff6b35" text-anchor="middle">⚡ Auto-Updated Hourly</text>

    <!-- Stars badge -->
    <rect x="170" y="0" width="140" height="32" rx="16" fill="#f7931e20" stroke="#f7931e" stroke-width="1"/>
    <text x="240" y="21" font-family="Arial" font-size="13" fill="#f7931e" text-anchor="middle">⭐ Top Starred Repos</text>

    <!-- No forks badge -->
    <rect x="0" y="48" width="150" height="32" rx="16" fill="#7c3aed20" stroke="#7c3aed" stroke-width="1"/>
    <text x="75" y="69" font-family="Arial" font-size="13" fill="#a78bfa" text-anchor="middle">🔒 Original Only</text>

    <!-- FR/EN badge -->
    <rect x="170" y="48" width="140" height="32" rx="16" fill="#2563eb20" stroke="#2563eb" stroke-width="1"/>
    <text x="240" y="69" font-family="Arial" font-size="13" fill="#60a5fa" text-anchor="middle">🌍 FR | EN</text>

    <!-- Categories badge -->
    <rect x="0" y="96" width="150" height="32" rx="16" fill="#10b98120" stroke="#10b981" stroke-width="1"/>
    <text x="75" y="117" font-family="Arial" font-size="13" fill="#34d399" text-anchor="middle">📂 9 Categories</text>

    <!-- Security badge -->
    <rect x="170" y="96" width="140" height="32" rx="16" fill="#ef444420" stroke="#ef4444" stroke-width="1"/>
    <text x="240" y="117" font-family="Arial" font-size="13" fill="#f87171" text-anchor="middle">🛡️ Daily Security</text>
  </g>

  <!-- Divider line -->
  <line x1="280" y1="218" x2="760" y2="218" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Bottom decorative dots -->
  <circle cx="280" cy="258" r="3" fill="#ff6b35" opacity="0.6"/>
  <circle cx="296" cy="258" r="3" fill="#f7931e" opacity="0.6"/>
  <circle cx="312" cy="258" r="3" fill="#ffd700" opacity="0.6"/>

  <!-- Phoenix branding bottom right -->
  <text x="1150" y="265" font-family="Arial" font-size="11" fill="#475569" text-anchor="end">By ThePhoenixAgency</text>

  <!-- Animated glow effect on claw (static version) -->
  <circle cx="130" cy="120" r="80" fill="none" stroke="#ff6b35" stroke-width="0.5" opacity="0.15"/>
  <circle cx="130" cy="120" r="100" fill="none" stroke="#f7931e" stroke-width="0.3" opacity="0.1"/>
</svg>
