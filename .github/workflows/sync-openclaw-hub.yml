name: Sync Openclaw Hub

on:
  push:
    branches:
      - "claude/openclaw-repos-tracker-mJtrt"
    paths:
      - "Openclaw-Awesome-Hub/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/openclaw-repos-tracker-mJtrt
          fetch-depth: 1

      - name: Check token
        env:
          SYNC_TOKEN: ${{ secrets.OPENCLAW_SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "::error::Secret OPENCLAW_SYNC_TOKEN is EMPTY or NOT SET in repo secrets."
            echo "Go to: Settings > Secrets > Actions > New secret"
            echo "Name: OPENCLAW_SYNC_TOKEN"
            echo "Value: your GitHub PAT with repo scope"
            exit 1
          fi
          echo "Token OK (length=${#SYNC_TOKEN})"

      - name: Push to Openclaw-Awesome-Hub
        env:
          SYNC_TOKEN: ${{ secrets.OPENCLAW_SYNC_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch main

          TMPDIR=$(mktemp -d)
          cp -r Openclaw-Awesome-Hub/. "$TMPDIR/"

          cd "$TMPDIR"
          git init
          git checkout -b main
          git add -A
          git commit -m "init: Openclaw Awesome Hub [skip ci]"

          git remote add origin \
            "https://x-access-token:${SYNC_TOKEN}@github.com/EthanThePhoenix38/Openclaw-Awesome-Hub.git"
          git push origin main --force
          echo "Push complete."
