name: Sync Openclaw Hub

on:
  push:
    branches:
      - "claude/openclaw-repos-tracker-mJtrt"
    paths:
      - "Openclaw-Awesome-Hub/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: claude/openclaw-repos-tracker-mJtrt
          fetch-depth: 1

      - name: Debug token and push
        env:
          SYNC_TOKEN: ${{ secrets.OPENCLAW_SYNC_TOKEN }}
        run: |
          echo "Token set: $([ -n "$SYNC_TOKEN" ] && echo YES || echo NO)"
          echo "Token length: ${#SYNC_TOKEN}"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch main

          TMPDIR=$(mktemp -d)
          cp -r Openclaw-Awesome-Hub/. "$TMPDIR/"

          cd "$TMPDIR"
          git init
          git checkout -b main
          git add -A
          echo "--- Files to push ---"
          git status --short
          git commit -m "init: Openclaw Awesome Hub [skip ci]"

          echo "--- Attempting push ---"
          git remote add origin \
            "https://x-access-token:${SYNC_TOKEN}@github.com/EthanThePhoenix38/Openclaw-Awesome-Hub.git"
          git push origin main --force 2>&1
          echo "Exit code: $?"
