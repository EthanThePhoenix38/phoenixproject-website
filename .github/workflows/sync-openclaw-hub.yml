name: Sync Openclaw Hub

on:
  push:
    branches:
      - claude/openclaw-repos-tracker-mJtrt
    paths:
      - "Openclaw-Awesome-Hub/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/openclaw-repos-tracker-mJtrt
          fetch-depth: 0
          token: ${{ secrets.OPENCLAW_SYNC_TOKEN }}

      - name: Push Openclaw-Awesome-Hub to its repo
        env:
          SYNC_TOKEN: ${{ secrets.OPENCLAW_SYNC_TOKEN }}
        run: |
          if [ -z "$SYNC_TOKEN" ]; then
            echo "OPENCLAW_SYNC_TOKEN secret not set."
            exit 1
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global init.defaultBranch main

          # Work in a clean temp dir
          TMPDIR=$(mktemp -d)
          cp -r Openclaw-Awesome-Hub/. "$TMPDIR/"

          cd "$TMPDIR"
          git init
          git checkout -b main
          git add -A
          git status
          git commit -m "init: Openclaw Awesome Hub [skip ci]"

          git remote add origin "https://x-access-token:${SYNC_TOKEN}@github.com/EthanThePhoenix38/Openclaw-Awesome-Hub.git"
          git push origin main --force
          echo "Sync complete."
